name: Next.js CI

on:
  push:
    branches: [ "main", "Development" ]
  pull_request:
    branches: [ "main", "Development" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check code formatting & linting
      run: npm run lint
      
    - name: Build project
      run: npm run build
